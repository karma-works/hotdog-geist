<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 44" width="28" height="44">
  <!-- Wheels -->
  <rect x="0"  y="7"  width="5" height="9" rx="1" fill="#111"/>
  <rect x="23" y="7"  width="5" height="9" rx="1" fill="#111"/>
  <rect x="0"  y="28" width="5" height="9" rx="1" fill="#111"/>
  <rect x="23" y="28" width="5" height="9" rx="1" fill="#111"/>
  <!-- Car body -->
  <rect x="3" y="3" width="22" height="38" rx="4" fill="#1a4acc"/>
  <!-- Front windshield -->
  <rect x="5" y="6"  width="18" height="10" rx="2" fill="#aad4ff" opacity="0.85"/>
  <!-- Rear windshield -->
  <rect x="5" y="28" width="18" height="8"  rx="2" fill="#aad4ff" opacity="0.85"/>
  <!-- Hood line -->
  <rect x="5" y="17" width="18" height="1" fill="#0d2e99" opacity="0.5"/>
  <!-- Light bar -->
  <rect x="7"  y="1" width="6"  height="3" rx="1" fill="#dd2222"/>
  <rect x="15" y="1" width="6"  height="3" rx="1" fill="#2222dd"/>
  <!-- Badge star -->
  <polygon points="14,20 15,23 18,23 16,25 17,28 14,26 11,28 12,25 10,23 13,23"
           fill="#f0d040" opacity="0.9" transform="scale(0.6) translate(9.5,12)"/>
</svg>
