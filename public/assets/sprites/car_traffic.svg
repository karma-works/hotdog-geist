<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 40" width="24" height="40">
  <!-- Wheels -->
  <rect x="0"  y="6"  width="4" height="8" rx="1" fill="#111"/>
  <rect x="20" y="6"  width="4" height="8" rx="1" fill="#111"/>
  <rect x="0"  y="26" width="4" height="8" rx="1" fill="#111"/>
  <rect x="20" y="26" width="4" height="8" rx="1" fill="#111"/>
  <!-- Car body -->
  <rect x="2" y="2" width="20" height="36" rx="3" fill="#888" opacity="0.92"/>
  <!-- Front windshield -->
  <rect x="4" y="5"  width="16" height="9" rx="2" fill="#cce8ff" opacity="0.8"/>
  <!-- Rear windshield -->
  <rect x="4" y="26" width="16" height="7" rx="2" fill="#cce8ff" opacity="0.8"/>
  <!-- Hood line -->
  <rect x="4" y="15" width="16" height="1" fill="#555" opacity="0.4"/>
</svg>
